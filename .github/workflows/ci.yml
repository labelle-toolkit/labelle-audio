name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout labelle-core
        run: git clone --depth 1 --branch main https://github.com/labelle-toolkit/labelle-core.git ../labelle-core

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run unit tests
        run: zig build test

      - name: Run zspec tests
        run: zig build spec
